backend:
  name: github
  repo: aay0909-rgb/Marathon_Project
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "notice"
    label: "공지사항"
    folder: "data/notices"
    create: true
    delete: true
    update: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "json"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성자", name: "author", widget: "string", default: "관리자" }
      - { label: "작성일", name: "date", widget: "datetime", format: "YYYY.MM.DD", date_format: "YYYY.MM.DD", time_format: false }
      - { label: "내용", name: "body", widget: "markdown" }

  - name: "registrations_config" # 컬렉션 이름 중복 방지를 위해 수정
    label: "참가자 관리"
    files: # 단일 파일 관리 시 필수 항목
      - name: "registrations_file"
        label: "참가자 명단 (JSON)"
        file: "registrations.json" # 파일이 루트(최상위)에 있어야 함
        format: "json"
        fields:
          - name: "registrants"
            label: "참가자 목록"
            widget: "list"
            fields:
              - { label: "코스", name: "course", widget: "string" }
              - { label: "이름", name: "name", widget: "string" }
              - { label: "생년월일", name: "dob", widget: "string" }
              - { label: "성별", name: "gender", widget: "string" }
              - { label: "연락처", name: "phone", widget: "string" }
              - { label: "이메일", name: "email", widget: "string" }
              - { label: "비상연락처", name: "emergency_contact", widget: "string" }
              - { label: "티셔츠 사이즈", name: "tshirt_size", widget: "string" }
              - { label: "주문번호", name: "orderId", widget: "string" }
              - label: "결제 상태"
                name: "paymentStatus"
                widget: "select"
                options:
                  - { label: "입금 대기", value: "pending_transfer" }
                  - { label: "입금 완료", value: "DONE" }
