<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참가신청 - 용인 RUN FESTA</title>
    <script>
        const registrationForm = document.getElementById('registrationForm');

        registrationForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            if (!document.getElementById('agree').checked) {
                alert('개인정보 수집 및 이용에 동의해야 합니다.');
                return;
            }

            const course = document.querySelector('input[name="course"]:checked').value;
            const amount = course === '10km' ? "40,000원" : "30,000원";
            const bankInfo = `
참가비(${amount})를 아래 계좌로 입금해주세요.

예금주: 홍길동
은행: 춘향은행
계좌번호: 012-345-678901

입금 확인은 최대 24시간이 소요될 수 있습니다.
            `;

            alert(bankInfo);

            const confirmed = confirm("위 계좌로 참가비를 입금하셨나요?\n'확인'을 누르시면 신청이 완료됩니다.");

            if (confirmed) {
                const formData = new FormData(registrationForm);
                const data = Object.fromEntries(formData.entries());

                try {
                    const response = await fetch('/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data),
                    });

                    if (response.ok) {
                        alert("참가신청이 완료되었습니다!\n\n입금 확인 문자를 신청서에 작성하신 전화번호로 보낼 예정입니다.\n24시간 내에 문자를 받지 못하셨다면 해당 번호로 문의부탁드립니다.");
                        window.location.href = 'index.html'; // Redirect to home or a success page
                    } else {
                        alert('신청 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                    }
                } catch (error) {
                    console.error('Error submitting registration:', error);
                    alert('신청 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                }
            } else {
                alert('신청이 취소되었습니다.');
            }
        });
    </script>
</body>
</html>
