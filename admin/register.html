<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참가자 목록 - HUFS Marathon</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>참가자 목록</h1>
        <table id="registrationsTable">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Course</th>
                    <th>Name</th>
                    <th>Date of Birth</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Emergency Contact</th>
                    <th>T-shirt Size</th>
                    <th>Group Name</th>
                    <th>Participant Count</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        function checkPassword() {
            const password = prompt('Please enter the password to view this page:');
            if (password === '1234') {
                fetchRegistrations();
            } else {
                alert('Incorrect password.');
            }
        }

        async function fetchRegistrations() {
            try {
                // Netlify 정적 호스팅에 맞게 깃허브에서 직접 json을 가져옴
                const response = await fetch('https://raw.githubusercontent.com/aay0909-rgb/Marathon_Project/main/registrations.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error('참가자 목록을 불러오는 데 실패했습니다.');
                }
                const data = await response.json();
                const registrations = data.registrants || [];

                const tbody = document.querySelector('#registrationsTable tbody');
                tbody.innerHTML = '';

                registrations.forEach(registration => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${registration.type}</td>
                        <td>${registration.course || ''}</td>
                        <td>${registration.name}</td>
                        <td>${registration.dob || ''}</td>
                        <td>${registration.gender || ''}</td>
                        <td>${registration.phone}</td>
                        <td>${registration.email}</td>
                        <td>${registration.emergency_contact || ''}</td>
                        <td>${registration.tshirt_size || ''}</td>
                        <td>${registration.group_name || ''}</td>
                        <td>${registration.participant_count || ''}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }

        checkPassword();
    </script>
</body>
</html>
